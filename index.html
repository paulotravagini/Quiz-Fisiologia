    .result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}.stat{padding:17px}.stat span{display:block;color:var(--muted);font-weight:800}.stat b{font-size:1.9rem;letter-spacing:-.04em}.review-list{display:grid;gap:12px;margin-top:12px}.review{padding:16px;border-left:5px solid var(--border)}.review.ok{border-left-color:var(--ok)}.review.bad{border-left-color:var(--bad)}.review h3{margin:0 0 8px}.ai-panel{display:grid;gap:12px}.ai-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}.ai-card{padding:17px}.ai-card h3{margin:0 0 8px}.ai-card ul,.ai-card ol{margin:0;padding-left:20px;color:var(--muted);line-height:1.6}.flash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}.flashcard{padding:13px;background:var(--card2);border:1px solid var(--border);border-radius:16px}.flashcard b{color:var(--primary)}

<script>
(function(){
  const matchingTypes = new Set(['matching','parear','relacionar','associar','correspondencia','match']);
  const toText = v => String(v ?? '').trim();
  const isMatchingType = q => matchingTypes.has(String(q.type || q.tipo || q.kind || '').toLowerCase());
  const normalizePair = p => {
    if (Array.isArray(p)) return { left: toText(p[0]), right: toText(p[1]) };
    if (p && typeof p === 'object') return { left: toText(p.left ?? p.esquerda ?? p.item ?? p.pergunta ?? p.a ?? p[0]), right: toText(p.right ?? p.direita ?? p.resposta ?? p.answer ?? p.b ?? p[1]) };
    return { left: '', right: '' };
  };
  const unique = arr => [...new Set(arr.map(toText).filter(Boolean))];

  app.normalizeSim = function(sim, si=0){
    try{
      if(!sim||typeof sim!=='object')return null;
      const id=this.slug(sim.id||sim.title||`sim_${si+1}`,`sim_${si+1}`);
      const title=String(sim.title||sim.titulo||`Simulado ${si+1}`).trim();
      const desc=String(sim.desc||sim.description||sim.descricao||'Simulado importado').trim();
      if(!Array.isArray(sim.questions)&&Array.isArray(sim.questoes))sim.questions=sim.questoes;
      if(!Array.isArray(sim.questions))return null;
      const used=new Set();
      const questions=sim.questions.map((q,qi)=>{
        let qid=this.slug(q.id||`${id}_q${qi+1}`,`${id}_q${qi+1}`);
        while(used.has(qid))qid=`${qid}_${qi+1}`; used.add(qid);
        const text=String(q.text||q.pergunta||q.enunciado||q.instrucao||'').trim();
        const topic=String(q.topic||q.tema||'').trim()||undefined;
        const hint=String(q.hint||q.dica||'').trim();
        const explanation=String(q.explanation||q.comentario||q.comment||'').trim();
        const rawPairs = q.pairs || q.pares || q.matching || q.relacoes || q.relações || q.items;
        if(isMatchingType(q) || Array.isArray(rawPairs)){
          const pairs=(rawPairs||[]).map(normalizePair).filter(p=>p.left&&p.right);
          if(pairs.length<2)throw new Error(`Questão ${qi+1} de parear precisa de pelo menos 2 pares.`);
          const extra = q.options || q.alternatives || q.alternativas || q.matchOptions || q.opcoes || [];
          const matchOptions=unique([...pairs.map(p=>p.right), ...extra]);
          const matchCorrect=pairs.map(p=>matchOptions.findIndex(o=>o.toLowerCase()===p.right.toLowerCase()));
          if(matchCorrect.some(x=>x<0))throw new Error(`Erro nas respostas da questão ${qi+1} de parear.`);
          return {id:qid,type:'matching',text:text||'Relacione os itens corretamente.',pairs,matchOptions,matchCorrect,options:matchOptions,correct:matchCorrect,hint,explanation,topic};
        }
        const options=(q.options||q.alternatives||q.alternativas||[]).map(x=>String(x));
        let correct=this.parseCorrect({...q,options});
        if(correct<0||correct>=options.length)throw new Error(`Gabarito inválido na questão ${qi+1}.`);
        return{id:qid,text,options,correct,hint,explanation,topic};
      });
      if(!questions.length)throw new Error('Simulado sem questões.');
      questions.forEach((q,i)=>{if(!q.text)throw new Error(`Questão ${i+1} sem enunciado.`);if(q.type==='matching'){if(!q.pairs?.length)throw new Error(`Questão ${i+1} de parear sem pares.`)}else if(q.options.length<2)throw new Error(`Questão ${i+1} sem alternativas suficientes.`)});
      return{id,title,desc,questions};
    }catch(e){throw e}
  };

  app.start = function(title,type,base,source=null){
    if(!base.length)return this.toast('Este simulado não tem questões.');
    this.stopTimer();
    const qs=this.state.settings.shuffle?U.shuffle(base):[...base];
    this._matchingDrafts={};
    this.state={...this.state,title,type,source,idx:0,answers:{},seconds:0,questions:qs.map(q=>{
      if(q.type==='matching'){
        let order=(q.matchOptions||[]).map((_,i)=>i);
        if(this.state.settings.answerShuffle)order=U.shuffle(order);
        const correct=(q.matchCorrect||[]).map(ix=>order.indexOf(ix));
        return{...q,matchOptionOrder:order,correct,topic:q.topic||this.classify(q)};
      }
      let order=(q.options||[]).map((_,i)=>i); if(this.state.settings.answerShuffle)order=U.shuffle(order);
      const correct=order.indexOf(q.correct);
      return{...q,optionOrder:order,correct:correct>=0?correct:q.correct,topic:q.topic||this.classify(q)};
    })};
    this.saveProgress(); this.renderQuiz(); this.startTimer();
  };

  app.saveProgress = function(){
    if(!this.state.questions.length)return;
    LS.set('progress',{title:this.state.title,type:this.state.type,source:this.state.source,idx:this.state.idx,answers:this.state.answers,seconds:this.state.seconds,questions:this.state.questions.map(q=>({id:q.id,order:q.optionOrder,matchOrder:q.matchOptionOrder,type:q.type}))});
  };

  app.continueLast = function(){
    const p=LS.get('progress'); if(!p)return this.toast('Nenhum progresso salvo.');
    const all=U.all(); this._matchingDrafts={};
    const qs=(p.questions||[]).map(saved=>{
      const b=all.find(q=>q.id===saved.id); if(!b)return null;
      if(b.type==='matching'){
        const order=Array.isArray(saved.matchOrder)?saved.matchOrder:(b.matchOptions||[]).map((_,i)=>i);
        const correct=(b.matchCorrect||[]).map(ix=>order.indexOf(ix));
        return{...b,matchOptionOrder:order,correct,topic:b.topic||this.classify(b)};
      }
      const order=Array.isArray(saved.order)?saved.order:b.options.map((_,i)=>i); const correct=order.indexOf(b.correct);
      return{...b,optionOrder:order,correct:correct>=0?correct:b.correct,topic:b.topic||this.classify(b)};
    }).filter(Boolean);
    if(!qs.length)return this.toast('Progresso antigo incompatível.');
    this.state={...this.state,title:p.title,type:p.type,source:p.source,idx:p.idx||0,answers:p.answers||{},seconds:p.seconds||0,questions:qs};
    this.renderQuiz(); this.startTimer();
  };

  app.matchOpt = function(q,i){ const original=(q.matchOptionOrder||q.matchOptions.map((_,x)=>x))[i]; return q.matchOptions?.[original]??'' };
  app.matchCorrectText = function(q){ return (q.pairs||[]).map((p,i)=>`${i+1}. ${p.left} → ${this.matchOpt(q,(q.correct||[])[i])}`).join(' / ') };

  app.renderOne = function(q,i){
    const ans=this.state.answers[q.id],done=ans!==undefined;
    if(q.type==='matching')return this.renderMatching(q,i,done,ans);
    return`<article class="quiz-card question" id="question-${i+1}"><div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px"><span class="tag">Questão ${i+1}</span><span class="tag">${U.esc(q.topic||'Geral')}</span></div><div class="q-box">${U.esc(this.txt(q))}</div>${this.state.settings.hints&&q.hint?`<details style="margin-top:10px"><summary class="tag">Dica</summary><div class="comment">${U.esc(q.hint)}</div></details>`:''}<div class="options">${(q.optionOrder||[]).map((_,j)=>this.option(q,j,done,ans)).join('')}</div>${done?this.comment(q,ans):''}</article>`;
  };

  app.renderMatching = function(q,i,done,ans){
    const draft = done ? ans : (this._matchingDrafts?.[q.id] || []);
    const bank = (q.matchOptionOrder||q.matchOptions.map((_,x)=>x)).map((_,j)=>`<span class="match-chip"><b>${U.label(j)}</b>${U.esc(this.matchOpt(q,j))}</span>`).join('');
    const rows = (q.pairs||[]).map((p,row)=>{
      const val = draft[row] ?? '';
      const status = done ? (Number(val)===q.correct[row]?'correct':'wrong') : '';
      const opts = `<option value="">Escolher resposta...</option>` + (q.matchOptionOrder||[]).map((_,j)=>`<option value="${j}" ${String(val)===String(j)?'selected':''}>${U.label(j)} — ${U.esc(this.matchOpt(q,j))}</option>`).join('');
      const feedback = done ? `<div class="match-feedback"><b>Correto:</b> ${U.label(q.correct[row])} — ${U.esc(this.matchOpt(q,q.correct[row]))}</div>` : '';
      return `<div class="match-row ${status}"><div class="match-left"><small>Item ${row+1}</small>${U.esc(p.left)}</div><div><select class="match-select" ${done?'disabled':''} onchange="app.updateMatchDraft('${q.id}',${row},this.value)">${opts}</select>${feedback}</div></div>`;
    }).join('');
    return `<article class="quiz-card question" id="question-${i+1}"><div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px"><span class="tag">Questão ${i+1}</span><span class="tag">Parear interativo</span><span class="tag">${U.esc(q.topic||'Geral')}</span></div><div class="q-box">${U.esc(this.txt(q))}</div>${this.state.settings.hints&&q.hint?`<details style="margin-top:10px"><summary class="tag">Dica</summary><div class="comment">${U.esc(q.hint)}</div></details>`:''}<div class="matching-box"><div class="match-help">Leia o item da esquerda e escolha, no seletor da direita, a opção correspondente. As opções estão no banco abaixo.</div><div class="match-bank">${bank}</div><div class="match-rows">${rows}</div>${!done?`<button class="btn primary" onclick="app.submitMatching('${q.id}')">Conferir pareamento</button>`:''}</div>${done?this.comment(q,ans):''}</article>`;
  };

  app.updateMatchDraft = function(id,row,value){ if(!this._matchingDrafts)this._matchingDrafts={}; const arr=this._matchingDrafts[id]||[]; arr[row]=value===''?'':Number(value); this._matchingDrafts[id]=arr; };
  app.submitMatching = function(id){
    const qi=this.state.questions.findIndex(q=>q.id===id),q=this.state.questions[qi]; if(!q||q.type!=='matching'||this.state.answers[id]!==undefined)return;
    const draft=(this._matchingDrafts&&this._matchingDrafts[id])||[];
    if(draft.length<q.pairs.length || draft.some(v=>v===''||v===undefined||!Number.isInteger(v))) return this.toast('Complete todos os pares antes de conferir.');
    const snap=this.snapshot(`question-${qi+1}`); this.state.idx=qi; this.state.answers[id]=draft.slice(0,q.pairs.length); this.saveProgress(); this._keep=true; this.renderQuiz(); this.restore(snap);
  };

  const oldAnswer = app.answer.bind(app);
  app.answer = function(id,i){ const q=this.state.questions.find(q=>q.id===id); if(q?.type==='matching')return this.submitMatching(id); return oldAnswer(id,i); };
  app.correct = function(id){ const q=this.state.questions.find(q=>q.id===id); if(!q)return false; const ans=this.state.answers[id]; if(q.type==='matching')return Array.isArray(ans)&&Array.isArray(q.correct)&&ans.length===q.correct.length&&ans.every((v,i)=>Number(v)===q.correct[i]); return ans===q.correct; };
  app.comment = function(q,ans){ if(q.type==='matching')return`<div class="comment"><b>${this.correct(q.id)?'Resposta correta':'Resposta incorreta'}</b><br><b>Gabarito:</b> ${U.esc(this.matchCorrectText(q))}${q.explanation?`<br>${q.explanation}`:''}</div>`; return`<div class="comment"><b>${ans===q.correct?'Resposta correta':'Resposta incorreta'}</b><br>${q.explanation||`Correta: ${U.esc(this.opt(q,q.correct))}`}</div>` };
  app.fillExample = function(){};
})();
</script>

<script>
(function(){
  if(!window.app) return;
  app.build = '2026-05-24-revisar-erros-imediato';

  app.correctAnswerText = function(q){
    if(!q) return '';
    if(q.type === 'matching' && this.matchCorrectText) return this.matchCorrectText(q);
    return this.opt(q, q.correct) || '';
  };

  app.userAnswerText = function(q){
    const ans = this.state.answers[q.id];
    if(ans === undefined) return 'Não respondida';
    if(q.type === 'matching' && Array.isArray(ans)) return (q.pairs||[]).map((p,i)=>`${p.left} → ${this.matchOpt(q, Number(ans[i])) || 'sem resposta'}`).join(' / ');
    return this.opt(q, ans) || 'Não respondida';
  };

  app.getQuestionsByIds = function(ids){
    const all = U.all();
    return (ids||[]).map(id=>all.find(q=>q.id===id)).filter(Boolean);
  };

  app.lastWrongReview = function(){
    return LS.get('last_wrong_review', null) || null;
  };

  app.startWrongReviewByIds = function(ids, title='Revisar questões erradas'){
    const qs = this.getQuestionsByIds(ids);
    if(!qs.length) return this.toast('Não encontrei questões erradas para refazer.');
    this.start(title, 'wrong-review', qs, {kind:'wrong-review', ids});
  };

  app.startLastWrongReview = function(){
    const data = this.lastWrongReview();
    if(!data || !Array.isArray(data.ids) || !data.ids.length) return this.toast('Nenhum erro do último simulado para refazer.');
    this.startWrongReviewByIds(data.ids, `Refazendo erros — ${data.title || 'último simulado'}`);
  };

  app.startSavedErrorBank = function(){
    const ids = LS.get('error_bank', []);
    if(!ids.length) return this.toast('Banco de erros vazio.');
    this.startWrongReviewByIds(ids, 'Revisar todos os erros salvos');
  };

  app.markLastWrongAsViewed = function(){
    const data = this.lastWrongReview();
    if(!data || !data.ids?.length) return this.toast('Nenhum erro do último simulado.');
    this.showWrongList(data.ids, data.title || 'Último simulado');
  };

  app.showWrongList = function(ids, title='Questões erradas'){
    this.stopTimer();
    const qs = this.getQuestionsByIds(ids);
    const list = qs.map((q,i)=>`<div class="card review bad"><h3>Erro ${i+1}</h3><p>${U.esc(q.text)}</p><p><b>Gabarito:</b> ${U.esc(this.correctAnswerText(q))}</p></div>`).join('');
    document.getElementById('result').innerHTML = `<div class="section"><div><h2>${U.esc(title)}</h2><p>Essas são as questões que você não acertou. Você pode responder novamente só esse bloco.</p></div><button class="btn" onclick="app.showHome()">Início</button></div><div class="retry-now-card"><h3>Responder novamente</h3><p>Refaça apenas essas ${qs.length} questão(ões), sem misturar com o simulado completo.</p><div class="retry-now-actions"><button class="btn primary" onclick="app.startWrongReviewByIds(${JSON.stringify(ids).replace(/"/g,'&quot;')}, 'Refazendo erros')">Responder essas questões</button><button class="btn" onclick="app.showSmartReview()">Banco geral de erros</button></div></div><div class="review-list">${list || '<div class="card empty"><h3>Sem erros</h3><p>Nenhuma questão encontrada.</p></div>'}</div>`;
    this.setScreen('result');
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelector('[data-tab="errors"]')?.classList.add('active');
  };

  app.retryNowPanel = function(wrongQs, result){
    if(!wrongQs.length){
      return `<div class="retry-now-card success-card"><h3>Você não errou nenhuma questão.</h3><p>Ótimo resultado. Use o histórico para acompanhar sua evolução ou faça outro simulado para manter a fixação.</p><div class="retry-now-actions"><button class="btn primary" onclick="app.showHome('sims')">Fazer outro simulado</button><button class="btn" onclick="app.showHistory()">Ver desempenho</button></div></div>`;
    }
    const ids = wrongQs.map(q=>q.id);
    const preview = wrongQs.slice(0,3).map((q,i)=>`<div class="wrong-mini"><b>${i+1}. ${U.esc(q.topic||this.classify(q)||'Geral')}</b><p>${U.esc(q.text).slice(0,170)}${q.text.length>170?'...':''}</p></div>`).join('');
    return `<div class="retry-now-card"><h3>Refazer agora as questões que você errou</h3><p>Você não acertou <b>${wrongQs.length}</b> questão(ões). Clique abaixo para responder novamente somente essas perguntas, sem refazer o simulado inteiro.</p><div class="retry-now-actions"><button class="btn primary" onclick="app.startLastWrongReview()">Responder só as erradas</button><button class="btn" onclick="app.markLastWrongAsViewed()">Ver lista de erros</button><button class="btn ghost" onclick="app.showSmartReview()">Banco geral de erros</button></div><div class="wrong-mini-list">${preview}</div></div>`;
  };

  app.updateErrors = function(){
    const e = new Set(LS.get('error_bank', []));
    this.state.questions.forEach(q=>{ if(this.correct(q.id)) e.delete(q.id); else e.add(q.id); });
    LS.set('error_bank', [...e]);
  };

  app.finish = function(){
    this.stopTimer();
    const total = this.state.questions.length;
    const correct = this.state.questions.filter(q=>this.correct(q.id)).length;
    const answered = Object.keys(this.state.answers).length;
    const wrongQs = this.state.questions.filter(q=>!this.correct(q.id));
    const wrong = wrongQs.length;
    const pct = U.pct(correct,total);
    this.updateErrors();
    const lastWrong = {date:new Date().toISOString(), title:this.state.title, ids:wrongQs.map(q=>q.id), total, correct, wrong};
    LS.set('last_wrong_review', lastWrong);
    const r={date:new Date().toISOString(),title:this.state.title,total,correct,wrong,unanswered:total-answered,pct,seconds:this.state.seconds,wrongIds:lastWrong.ids};
    const h=LS.get('history',[]);h.unshift(r);LS.set('history',h.slice(0,60));LS.del('progress');
    const review = this.state.questions.map((q,i)=>`<div class="card review ${this.correct(q.id)?'ok':'bad'}"><h3>Questão ${i+1}</h3><p>${U.esc(q.text)}</p><p><b>Sua resposta:</b> ${U.esc(this.userAnswerText(q))}</p><p><b>Correta:</b> ${U.esc(this.correctAnswerText(q))}</p></div>`).join('');
    document.getElementById('result').innerHTML=`<div class="section"><div><h2>Resultado</h2><p>${U.esc(r.title)}</p></div><button class="btn" onclick="app.showHome()">Início</button></div><div class="result-grid"><div class="card stat"><span>Nota</span><b>${pct}%</b></div><div class="card stat"><span>Acertos</span><b>${correct}/${total}</b></div><div class="card stat"><span>Erros</span><b>${wrong}</b></div><div class="card stat"><span>Tempo</span><b>${U.time(r.seconds)}</b></div></div>${this.retryNowPanel(wrongQs,r)}${this.smartPanel()}<div class="section"><div><h2>Revisão completa</h2><p>Veja cada questão, sua resposta e o gabarito.</p></div></div><div class="review-list">${review}</div>`;
    this.setScreen('result');
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelector('[data-tab="results"]')?.classList.add('active');
  };

  app.showSmartReview = function(){
    this.stopTimer();
    const ids = LS.get('error_bank', []);
    const qs = this.getQuestionsByIds(ids);
    const list = qs.map((q,i)=>`<div class="card review bad"><h3>Erro salvo ${i+1}</h3><p>${U.esc(q.text)}</p><p><b>Gabarito:</b> ${U.esc(this.correctAnswerText(q))}</p></div>`).join('');
    document.getElementById('result').innerHTML=`<div class="section"><div><h2>Revisar Erros</h2><p>Banco geral de questões que você errou ou deixou sem responder.</p></div><button class="btn" onclick="app.showHome()">Início</button></div><div class="retry-now-card"><h3>${qs.length?`Você tem ${qs.length} erro(s) salvo(s)`:'Nenhum erro salvo'}</h3><p>${qs.length?'Responda novamente apenas as questões erradas para fixar o conteúdo.':'Finalize um simulado para alimentar esse modo automaticamente.'}</p><div class="retry-now-actions"><button class="btn primary" onclick="app.startSavedErrorBank()" ${qs.length?'':'disabled'}>Responder erros salvos</button><button class="btn" onclick="app.startLastWrongReview()">Refazer último erro</button><button class="btn danger" onclick="LS.set('error_bank',[]);app.showSmartReview();app.toast('Banco de erros limpo.')" ${qs.length?'':'disabled'}>Limpar erros</button></div></div>${this.smartPanel()}<div class="review-list">${list}</div>`;
    this.setScreen('result');
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelector('[data-tab="errors"]')?.classList.add('active');
  };

  const oldShowHome = app.showHome.bind(app);
  app.showHome = function(anchor){
    oldShowHome(anchor);
    const nav = document.querySelector('.bottom-tabs');
    if(nav){
      nav.innerHTML = `<button class="tab active" data-tab="home" onclick="app.showHome()">⌂<span>Início</span></button><button class="tab" data-tab="sims" onclick="app.showHome('sims')">▦<span>Simulados</span></button><button class="tab" data-tab="errors" onclick="app.showSmartReview()">↻<span>Erros</span></button><button class="tab" data-tab="results" onclick="app.showHistory()">↗<span>Desempenho</span></button>`;
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      document.querySelector(`[data-tab="${anchor==='sims'?'sims':'home'}"]`)?.classList.add('active');
    }
  };
})();
</script>

<script>
(function(){
  if(!window.app) return;
  app.build = '2026-05-24-correcao-didatica-v2-fix';

  const previousNormalize = app.normalize ? app.normalize.bind(app) : function(){};
  app.normalize = function(){
    previousNormalize();
    const s=this.state.settings;
    if(!['off','simple','didactic','exam'].includes(s.correctionMode)) s.correctionMode='simple';
  };

  app.getCorrectionMode = function(){
    const v=this.state?.settings?.correctionMode;
    return ['off','simple','didactic','exam'].includes(v)?v:'simple';
  };

  app.shortExplanation = function(q){
    const raw=String(q?.explanation || '').trim();
    if(!raw) return `A resposta correta é: ${this.correctAnswerText(q)}.`;
    const parts=raw.match(/[^.!?]+[.!?]+|[^.!?]+$/g) || [raw];
    return parts.slice(0,2).join(' ').trim();
  };

  app.correctAnswerText = function(q){
    if(!q) return '';
    if(q.type==='matching' && this.matchCorrectText) return this.matchCorrectText(q);
    return this.opt ? (this.opt(q,q.correct)||'') : ((q.options||[])[q.correct]||'');
  };

  app.userAnswerText = function(q){
    const ans=this.state.answers[q.id];
    if(ans===undefined) return 'Não respondida';
    if(q.type==='matching' && Array.isArray(ans)) return (q.pairs||[]).map((p,i)=>`${p.left} → ${this.matchOpt(q, Number(ans[i])) || 'sem resposta'}`).join(' / ');
    return this.opt(q,ans) || 'Não respondida';
  };

  app.extractExamKeywords = function(q){
    const txt=String(q?.text||'').toLowerCase();
    const bank=['correta','incorreta','exceto','não','nunca','falso','verdadeiro','principal','melhor','define','caracteriza','aumenta','diminui','estimula','inibe','bloqueia','receptor','hormônio','hormona','insulina','glucagon','tsh','acth','adh','t3','t4','cortisol','aldosterona','hipotálamo','hipófise','tireoide','pâncreas','suprarrenal','sinapse','potencial','cálcio','potássio','sódio','glicose'];
    const found=[];
    bank.forEach(k=>{ if(txt.includes(k) && !found.includes(k)) found.push(k); });
    return found.slice(0,8);
  };

  app.detectTrap = function(q){
    const txt=String(q?.text||'').toLowerCase();
    if(/exceto|incorreta|falso|não|nunca/.test(txt)) return 'Pegadinha principal: há negação ou comando de exceção. Leia o comando antes das alternativas.';
    if(/aumenta|diminui|estimula|inibe|bloqueia/.test(txt)) return 'Pegadinha principal: a questão cobra direção do efeito fisiológico, não apenas conceito isolado.';
    if(/principal|melhor|mais diretamente/.test(txt)) return 'Pegadinha principal: pode haver alternativas parcialmente verdadeiras, mas só uma responde melhor ao comando.';
    return 'Pegadinha principal: identificar o mecanismo fisiológico central antes de escolher a alternativa.';
  };

  app.memSummary = function(q){
    const topic=U.esc(q?.topic || this.classify?.(q) || 'Fisiologia');
    const correct=U.esc(this.correctAnswerText(q));
    return `<b>Memorize:</b> em ${topic}, associe o comando da pergunta ao mecanismo central: <b>${correct}</b>`;
  };

  app.wrongReasons = function(q,ans){
    if(q.type==='matching'){
      const arr=Array.isArray(ans)?ans:[];
      return (q.pairs||[]).map((p,i)=>Number(arr[i])===Number(q.correct[i])?'':`<div class="correction-reason"><b>${U.esc(p.left)}:</b> o par marcado não corresponde ao gabarito. Correto: ${U.esc(this.matchOpt(q,q.correct[i]))}.</div>`).filter(Boolean).join('') || '<div class="correction-reason"><b>Sem erros nos pares.</b> Todos os pares conferem com o gabarito.</div>';
    }
    const options=q.options||[];
    const rows=[];
    (q.optionOrder||options.map((_,i)=>i)).forEach((_,displayIndex)=>{
      if(displayIndex===q.correct) return;
      const label=U.label(displayIndex);
      const text=U.esc(this.opt(q,displayIndex));
      const marked=displayIndex===ans?' Você marcou esta alternativa.':'';
      rows.push(`<div class="correction-reason"><b>${label}.</b> ${text}<br>Não é a melhor resposta para o comando da questão.${marked}</div>`);
    });
    return rows.join('');
  };

  app.correctionOff = function(q){
    return `<div class="comment correction-box"><h4>Alternativa correta</h4><p><b>${U.esc(this.correctAnswerText(q))}</b></p></div>`;
  };

  app.correctionSimple = function(q){
    return `<div class="comment correction-box"><h4>Correção simples</h4><p><b>Correta:</b> ${U.esc(this.correctAnswerText(q))}</p><p>${U.esc(this.shortExplanation(q))}</p></div>`;
  };

  app.correctionDidactic = function(q,ans){
    const ok=this.correct(q.id);
    return `<div class="comment correction-box"><span class="correction-status ${ok?'ok':'bad'}">${ok?'✓ Você acertou':'✕ Você errou'}</span><h4>Correção didática</h4><div class="correction-grid"><div class="correction-mini"><span>Alternativa marcada</span><strong>${U.esc(this.userAnswerText(q))}</strong></div><div class="correction-mini"><span>Alternativa correta</span><strong>${U.esc(this.correctAnswerText(q))}</strong></div></div><p><b>Por que a correta está certa:</b> ${U.esc(this.shortExplanation(q))}</p><div class="correction-reasons"><b>Motivo das erradas:</b>${this.wrongReasons(q,ans)}</div><div class="correction-summary">${this.memSummary(q)}</div></div>`;
  };

  app.correctionExam = function(q,ans){
    const ok=this.correct(q.id);
    const keys=this.extractExamKeywords(q).map(k=>`<span>${U.esc(k)}</span>`).join('') || '<span>mecanismo fisiológico</span>';
    return `<div class="comment correction-box"><span class="correction-status ${ok?'ok':'bad'}">${ok?'✓ Acertou':'✕ Errou'}</span><h4>Modo Prova</h4><p><b>Gabarito:</b> ${U.esc(this.correctAnswerText(q))}</p><div class="exam-keywords">${keys}</div><div class="exam-trap"><b>Foco de prova:</b> ${U.esc(this.detectTrap(q))}</div><p><b>Raciocínio:</b> ${U.esc(this.shortExplanation(q))}</p><div class="correction-summary"><b>Como resolver rápido:</b> destaque o comando, elimine alternativas que contradizem o mecanismo e confirme a relação causa → efeito.</div></div>`;
  };

  app.comment = function(q,ans){
    const mode=this.getCorrectionMode();
    if(mode==='off') return this.correctionOff(q,ans);
    if(mode==='didactic') return this.correctionDidactic(q,ans);
    if(mode==='exam') return this.correctionExam(q,ans);
    return this.correctionSimple(q,ans);
  };

  app.renderSettings = function(){
    const s=this.state.settings;
    const seg=(n,opts,v)=>`<div class="segment">${opts.map(o=>`<button class="seg ${String(v)===String(o.v)?'active':''}" onclick="app.setSetting('${n}','${o.v}')">${o.l}</button>`).join('')}</div>`;
    document.getElementById('settingsContent').innerHTML=
      `${this.row('Tema escuro','Visual para estudar à noite',seg('dark',[{l:'Off',v:false},{l:'On',v:true}],s.dark))}`+
      `${this.row('Formato','Cartões ou lista',seg('format',[{l:'Cartões',v:'cards'},{l:'Lista',v:'list'}],s.format))}`+
      `${this.row('Visualização',`Auto detectando: ${this.deviceLabel()} · ${this.deviceInfo().orientation==='portrait'?'Retrato':'Paisagem'}. Use manual só se quiser forçar. <span class="device-pill">Modo aplicado: ${this.layout()==='mobile'?'Celular':this.layout()==='ipad'?'Tablet/iPad':'PC'}</span>`,seg('layout',[{l:'Auto',v:'auto'},{l:'Celular',v:'mobile'},{l:'Tablet/iPad',v:'ipad'},{l:'PC',v:'pc'}],s.layout))}`+
      `${this.row('Embaralhar questões','Mistura ordem das perguntas',seg('shuffle',[{l:'Off',v:false},{l:'On',v:true}],s.shuffle))}`+
      `${this.row('Embaralhar opções','Mistura alternativas preservando o gabarito',seg('answerShuffle',[{l:'Off',v:false},{l:'On',v:true}],s.answerShuffle))}`+
      `${this.row('Dicas','Mostrar dicas nas questões',seg('hints',[{l:'Off',v:false},{l:'On',v:true}],s.hints))}`+
      `${this.row('Correção Didática','Controla como a resposta correta aparece depois que você responde uma questão.',seg('correctionMode',[{l:'Desativado',v:'off'},{l:'Simples',v:'simple'},{l:'Didático',v:'didactic'},{l:'Modo Prova',v:'exam'}],this.getCorrectionMode()))}`+
      `${this.row('Timer','Mostrar tempo no topo',seg('timerVisible',[{l:'Off',v:false},{l:'On',v:true}],s.timerVisible))}`;
  };

  app.setSetting = function(n,v){
    const inq=this.inQuiz(), snap=inq?this.snapshot(`question-${this.state.idx+1}`):null;
    if(['dark','shuffle','answerShuffle','hints','timerVisible'].includes(n)) v=v==='true';
    if(n==='correctionMode' && !['off','simple','didactic','exam'].includes(v)) v='simple';
    this.state.settings[n]=v;
    this.normalize();
    document.body.classList.toggle('dark',this.state.settings.dark);
    this.applyLayout();
    this.saveSettings();
    this.renderSettings();
    if(inq){this._keep=true;this.renderQuiz();this.restore(snap)}else this.header();
  };
})();
</script>

<script id="gpt-modern-performance-patch">
(function(){
  if(!window.app) return;
  app.build='2026-05-25-modern-performance-bugfix';

  // Cache do banco de questões: evita recriar todos os objetos a cada tela.
  let allCache=null;
  let idMapCache=null;
  const originalAll = U.all.bind(U);
  U.all = function(){
    if(!allCache) allCache = originalAll();
    return allCache;
  };
  app.invalidateQuestionCache = function(){
    allCache=null;
    idMapCache=null;
  };
  app.questionMap = function(){
    if(!idMapCache){
      idMapCache = new Map(U.all().map(q=>[q.id,q]));
    }
    return idMapCache;
  };
  app.getQuestionsByIds = function(ids){
    const map=this.questionMap();
    return [...new Set(ids||[])].map(id=>map.get(id)).filter(Boolean);
  };

  const originalInit = app.init.bind(app);
  app.init = function(){
    this.invalidateQuestionCache();
    originalInit();
  };

  // Botão "Lista" agora inicia diretamente em modo lista e salva a preferência.
  const originalStartCatIndex = app.startCatIndex.bind(app);
  app.startCatIndex = function(i,format){
    if(format && ['cards','list'].includes(format)){
      this.state.settings.format=format;
      this.saveSettings();
    }
    return originalStartCatIndex(i);
  };
  app.startCatList = function(i){ return this.startCatIndex(i,'list'); };
  app.startCatCards = function(i){ return this.startCatIndex(i,'cards'); };

  const originalSimCard = app.simCard.bind(app);
  app.simCard = function(c,i){
    const html = originalSimCard(c,i);
    return html
      .replace(`onclick="app.startCatIndex(${i})"`,`onclick="app.startCatCards(${i})" aria-label="Iniciar ${U.escAttr(c.title)} em cartões"`)
      .replace(`onclick="app.startCatIndex(${i});app.state.settings.format='list';app.renderQuiz()"`,`onclick="app.startCatList(${i})" aria-label="Iniciar ${U.escAttr(c.title)} em lista"`);
  };

  // Erros salvos: questões não respondidas também entram no banco de revisão.
  app.updateErrors = function(){
    const e = new Set(LS.get('error_bank', []));
    this.state.questions.forEach(q=>{
      if(this.correct(q.id)) e.delete(q.id);
      else e.add(q.id);
    });
    LS.set('error_bank', [...e]);
  };

  // Melhor contagem na tela de quiz: considera parear/lista de forma segura.
  app.answeredCount = function(){
    return this.state.questions.filter(q=>this.state.answers[q.id]!==undefined).length;
  };
  const originalRenderQuiz = app.renderQuiz.bind(app);
  app.renderQuiz = function(){
    originalRenderQuiz();
    const quiz = document.getElementById('quiz');
    if(!quiz) return;
    quiz.querySelectorAll?.('.metric b')?.forEach((b,idx)=>{
      if(idx===0) b.textContent = this.answeredCount();
    });
  };

  // Segurança visual: impede zoom estranho por inputs no iOS e melhora teclado na marca.
  document.addEventListener('DOMContentLoaded',()=>{
    document.querySelector('.brand')?.addEventListener('keydown',e=>{
      if(e.key==='Enter'||e.key===' '){
        e.preventDefault();
        app.showHome();
      }
    });
  });
})();
</script>
